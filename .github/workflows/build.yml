name: build

# On every merge that lands an entry, rebuild board.json + index.html from the entries log
# and publish them to GitHub Pages. Trusted: runs on push to main, only this repo's code,
# over verified data. The board is a Pages-ONLY artifact — it is never committed back to
# main, so the protected branch (which requires the `validate` check) stays pushable only
# through validated submission PRs. The source of truth is entries/; the board is derived.

on:
  push:
    branches: [main]
    paths:
      - "entries/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: benchmark-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.x"
      - run: pip install "haid==0.0.11"   # pinned; bump with ladder/combiner versions

      - name: Rebuild the Pages site (board.json + index.html)
        run: |
          python scripts/build_board.py
          mkdir -p public
          cp board.json index.html public/

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
