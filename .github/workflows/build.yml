name: build

# On every merge that lands an entry, rebuild board.json + index.html from the entries log
# and publish them to GitHub Pages. Trusted: runs on push to main, only this repo's code,
# over verified data. The board is a Pages-ONLY artifact — it is never committed back to
# main, so the protected branch (which requires the `validate` check) stays pushable only
# through validated submission PRs. The source of truth is entries/; the board is derived.

on:
  push:
    branches: [main]
    paths:
      - "entries/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: benchmark-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x"
      - run: pip install "haid==0.0.2"   # pinned; bump with ladder/combiner versions

      - name: Rebuild the Pages site (board.json + index.html)
        run: |
          python scripts/build_board.py
          mkdir -p public
          cp board.json index.html public/

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
